<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — 2501 Buttonbush Lane, Garland TX</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0908;
    --cream: #f2ede4;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --muted: #8a8278;
    --border: rgba(201,168,76,0.2);
    --sage: #4a6741;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Outfit', sans-serif; background: var(--black); color: white; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    padding: 16px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,9,8,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 16px; color: var(--gold-light);
    text-decoration: none; font-weight: 600;
  }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.5);
    text-decoration: none; transition: color 0.2s;
    font-weight: 500;
  }
  .nav-back:hover { color: var(--gold-light); }
  .nav-cta {
    background: var(--gold); color: var(--black);
    padding: 8px 18px; border-radius: 4px;
    font-size: 12px; font-weight: 700;
    text-decoration: none; letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--gold-light); }

  /* HEADER */
  .gallery-header {
    padding: 48px 64px 32px;
    display: flex; align-items: flex-end;
    justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .gallery-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .gallery-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }
  .gallery-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 700; line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .gallery-title em { color: var(--gold); font-style: italic; }
  .photo-count {
    font-size: 13px; color: rgba(255,255,255,0.35);
    font-weight: 500; letter-spacing: 0.5px;
  }

  /* TABS */
  .gallery-tabs {
    padding: 0 64px 24px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .gallery-tab {
    padding: 7px 18px; border-radius: 20px; font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: rgba(255,255,255,0.45);
    font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
  }
  .gallery-tab:hover { border-color: var(--gold); color: var(--gold); }
  .gallery-tab.active { background: var(--gold); border-color: var(--gold); color: var(--black); }

  /* GRID */
  .gallery-grid {
    padding: 0 64px 64px;
    columns: 4;
    column-gap: 6px;
  }
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 6px;
    position: relative; overflow: hidden;
    border-radius: 4px; cursor: pointer;
    background: #161210;
  }
  .gallery-item img {
    width: 100%; display: block;
    transition: transform 0.4s ease;
  }
  .gallery-item:hover img { transform: scale(1.03); }
  .gallery-item-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0); transition: background 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .gallery-item:hover .gallery-item-overlay { background: rgba(0,0,0,0.3); }
  .gallery-overlay-icon {
    font-size: 22px; opacity: 0; color: white;
    transition: opacity 0.3s;
  }
  .gallery-item:hover .gallery-overlay-icon { opacity: 1; }
  .gallery-item-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 12px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
    opacity: 0; transition: opacity 0.3s;
  }
  .gallery-item:hover .gallery-item-label { opacity: 1; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.97);
    display: none; align-items: center;
    justify-content: center; flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox-img-wrap {
    position: relative;
    max-width: 88vw; max-height: 78vh;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-img {
    max-width: 88vw; max-height: 78vh;
    object-fit: contain; border-radius: 4px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px;
    font-size: 26px; color: rgba(255,255,255,0.5);
    cursor: pointer; background: none; border: none;
    transition: color 0.2s; font-family: 'Outfit', sans-serif;
    z-index: 10;
  }
  .lightbox-close:hover { color: white; }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08); border: none; color: white;
    font-size: 22px; width: 48px; height: 48px; border-radius: 50%;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.18); }
  .lightbox-nav.prev { left: -64px; }
  .lightbox-nav.next { right: -64px; }
  .lightbox-footer {
    margin-top: 14px; display: flex;
    align-items: center; gap: 20px;
  }
  .lightbox-caption { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 0.5px; }
  .lightbox-counter { font-size: 12px; color: rgba(255,255,255,0.25); font-weight: 600; letter-spacing: 1px; }
  .lightbox-thumbs {
    display: flex; gap: 5px; margin-top: 12px;
    overflow-x: auto; max-width: 80vw; padding-bottom: 4px;
  }
  .lightbox-thumb {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 3px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.2s;
    background: #1a1612;
  }
  .lightbox-thumb.active { border-color: var(--gold); }
  .lightbox-thumb img { width: 100%; height: 100%; object-fit: cover; }

  @media (max-width: 900px) {
    nav { padding: 14px 20px; }
    .gallery-header { padding: 32px 20px 20px; }
    .gallery-tabs { padding: 0 20px 16px; }
    .gallery-grid { padding: 0 20px 40px; columns: 2; }
    .lightbox-nav.prev { left: -10px; }
    .lightbox-nav.next { right: -10px; }
    .lightbox-thumbs { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← Back to Listing</a>
  <a href="index.html" class="nav-logo">2501 Buttonbush Lane</a>
  <a href="index.html#contact" class="nav-cta">Inquire Now</a>
</nav>

<div class="gallery-header">
  <div>
    <div class="gallery-eyebrow">Photo Gallery</div>
    <h1 class="gallery-title">Every room.<br><em>Every detail.</em></h1>
  </div>
  <div class="photo-count" id="photo-count">60 photos</div>
</div>

<div class="gallery-tabs">
  <button class="gallery-tab active" onclick="filterGallery('all', this)">All (60)</button>
  <button class="gallery-tab" onclick="filterGallery('exterior', this)">Exterior (13)</button>
  <button class="gallery-tab" onclick="filterGallery('living', this)">Living (10)</button>
  <button class="gallery-tab" onclick="filterGallery('kitchen', this)">Kitchen (7)</button>
  <button class="gallery-tab" onclick="filterGallery('bedrooms', this)">Bedrooms (15)</button>
  <button class="gallery-tab" onclick="filterGallery('bathrooms', this)">Bathrooms (5)</button>
  <button class="gallery-tab" onclick="filterGallery('community', this)">Community (10)</button>
</div>

<div class="gallery-grid" id="gallery-grid"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-img-wrap">
    <button class="lightbox-nav prev" onclick="lightboxNav(-1,event)">‹</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <button class="lightbox-nav next" onclick="lightboxNav(1,event)">›</button>
  </div>
  <div class="lightbox-footer">
    <div class="lightbox-caption" id="lightbox-caption"></div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>
  <div class="lightbox-thumbs" id="lightbox-thumbs"></div>
</div>

<script>
  const BASE = 'https://raw.githubusercontent.com/gfasil123/rentIQ/refs/heads/main/media/buttonbushln';

  const PHOTOS = [
    // EXTERIOR (13)
    ...Array.from({length:13},(_,i)=>({ src:`${BASE}/exterior/exterior-${String(i+1).padStart(2,'0')}.jpg`, category:'exterior', label:'Exterior' })),
    // LIVING (10)
    ...Array.from({length:10},(_,i)=>({ src:`${BASE}/living/living-${String(i+1).padStart(2,'0')}.jpg`, category:'living', label:'Living Room' })),
    // KITCHEN (7)
    ...Array.from({length:7},(_,i)=>({ src:`${BASE}/kitchen/kitchen-${String(i+1).padStart(2,'0')}.jpg`, category:'kitchen', label:'Kitchen' })),
    // BEDROOMS (15)
    ...Array.from({length:15},(_,i)=>({ src:`${BASE}/bedrooms/bedrooms-${String(i+1).padStart(2,'0')}.jpg`, category:'bedrooms', label:'Bedroom' })),
    // BATHROOMS (5)
    ...Array.from({length:5},(_,i)=>({ src:`${BASE}/bathrooms/bathrooms-${String(i+1).padStart(2,'0')}.jpg`, category:'bathrooms', label:'Bathroom' })),
    // COMMUNITY (10)
    ...Array.from({length:10},(_,i)=>({ src:`${BASE}/community/community-${String(i+1).padStart(2,'0')}.jpg`, category:'community', label:'Community' })),
  ];

  let filteredPhotos = [...PHOTOS];
  let lightboxIndex = 0;

  function renderGallery(photos) {
    filteredPhotos = photos;
    document.getElementById('photo-count').textContent = photos.length + ' photos';
    document.getElementById('gallery-grid').innerHTML = photos.map((p, i) => `
      <div class="gallery-item" onclick="openLightbox(${i})">
        <img src="${p.src}" alt="${p.label}" loading="lazy">
        <div class="gallery-item-overlay"><div class="gallery-overlay-icon">⤢</div></div>
        <div class="gallery-item-label">${p.label}</div>
      </div>`).join('');
  }

  function filterGallery(cat, btn) {
    document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(cat === 'all' ? [...PHOTOS] : PHOTOS.filter(p => p.category === cat));
  }

  function openLightbox(i) {
    lightboxIndex = i;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    buildThumbs();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lightboxNav(dir, e) {
    e.stopPropagation();
    lightboxIndex = (lightboxIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const p = filteredPhotos[lightboxIndex];
    document.getElementById('lightbox-img').src = p.src;
    document.getElementById('lightbox-caption').textContent = p.label;
    document.getElementById('lightbox-counter').textContent = `${lightboxIndex + 1} / ${filteredPhotos.length}`;
    document.querySelectorAll('.lightbox-thumb').forEach((t,i) => t.classList.toggle('active', i === lightboxIndex));
    const active = document.querySelector('.lightbox-thumb.active');
    if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }

  function buildThumbs() {
    document.getElementById('lightbox-thumbs').innerHTML = filteredPhotos.map((p,i) => `
      <div class="lightbox-thumb ${i===lightboxIndex?'active':''}" onclick="lightboxIndex=${i};updateLightbox()">
        <img src="${p.src}" alt="${p.label}" loading="lazy">
      </div>`).join('');
  }

  function handleLightboxClick(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'ArrowRight') { lightboxIndex = (lightboxIndex+1) % filteredPhotos.length; updateLightbox(); }
    if (e.key === 'ArrowLeft') { lightboxIndex = (lightboxIndex-1+filteredPhotos.length) % filteredPhotos.length; updateLightbox(); }
    if (e.key === 'Escape') closeLightbox();
  });

  renderGallery(PHOTOS);
</script>
</body>
</html>
